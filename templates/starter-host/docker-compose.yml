services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: lenso
      POSTGRES_PASSWORD: lenso
      POSTGRES_DB: lenso
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenso -d lenso"]
      interval: 5s
      timeout: 3s
      retries: 10
