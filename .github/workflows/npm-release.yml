name: npm release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: check release secrets
    runs-on: ubuntu-latest
    steps:
      - run: |
          test -n "$LENSO_RUNTIME_CONSOLE_TOKEN"
          test -n "$NPM_TOKEN"
        env:
          LENSO_RUNTIME_CONSOLE_TOKEN: ${{ secrets.LENSO_RUNTIME_CONSOLE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  console:
    name: build Runtime Console
    runs-on: ubuntu-latest
    needs: preflight
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          repository: LioRael/lenso-runtime-console
          token: ${{ secrets.LENSO_RUNTIME_CONSOLE_TOKEN }}
          path: lenso-runtime-console
      - uses: actions/checkout@v6
        with:
          repository: LioRael/lenso-auth-module
          path: lenso-auth-module
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
        working-directory: lenso-runtime-console
      - run: corepack pnpm build:local
        working-directory: lenso-runtime-console
        env:
          LENSO_CONSOLE_BASE: /console/
          VITE_API_AUTH_TOKEN: dev-service:admin:runtime.stories.read,auth.users.read,identity.users.read,remote_crm.contacts.read,remote_crm.contacts.sync,hello-action:greetings:write
          VITE_API_BASE_URL: /
          VITE_RUNTIME_CONSOLE_MODE: api
      - name: Check Runtime Console payload
        run: |
          test -f dist/index.html
          test -f dist/extensions/host/runtime-console-api.js
          test -f dist/extensions/host/react.js
          test -f dist/extensions/host/react-jsx-runtime.js
          grep -q 'src="/console/assets/' dist/index.html
          grep -q 'href="/console/assets/' dist/index.html
          grep -R -q 'dev-service:admin:runtime.stories.read' dist/assets
          grep -R -q 'auth.users.read' dist/assets
          ! grep -R -q 'function F(){return!1}' dist/assets
        working-directory: lenso-runtime-console
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-console-dist
          path: lenso-runtime-console/dist
          if-no-files-found: error

  build:
    name: build ${{ matrix.tag }}
    runs-on: ${{ matrix.os }}
    needs: console
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: darwin-arm64
            os: macos-14
            rust-target: ""
            smoke: true
          - tag: darwin-x64
            os: macos-14
            rust-target: x86_64-apple-darwin
            smoke: false
          - tag: linux-x64
            os: ubuntu-latest
            rust-target: ""
            smoke: true
          - tag: win32-x64
            os: windows-latest
            rust-target: ""
            smoke: true
    steps:
      - uses: actions/checkout@v6
        with:
          path: lenso-cli
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add "${{ matrix.rust-target }}"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lenso-cli
      - uses: actions/download-artifact@v4
        with:
          name: runtime-console-dist
          path: lenso-cli/console/dist
      - name: Check Runtime Console
        run: |
          test -f console/dist/index.html
        working-directory: lenso-cli
      - run: npm run check:npm-shim
        working-directory: lenso-cli
      - run: npm run package:npm
        working-directory: lenso-cli
        env:
          LENSO_NPM_TAG: ${{ matrix.tag }}
          LENSO_CARGO_TARGET: ${{ matrix.rust-target }}
      - name: Check target artifact
        run: |
          if [[ "${{ matrix.tag }}" == win32-* ]]; then
            test -f "vendor/${{ matrix.tag }}/lenso.exe"
          else
            test -x "vendor/${{ matrix.tag }}/lenso"
          fi
        working-directory: lenso-cli
      - name: Smoke bundled binary
        if: matrix.smoke
        run: |
          node bin/lenso.js --version
          tmpdir="$(mktemp -d)"
          node bin/lenso.js host init "$tmpdir/app"
          test -f "$tmpdir/app/.lenso/console/dist/index.html"
        working-directory: lenso-cli
      - uses: actions/upload-artifact@v4
        with:
          name: lenso-cli-${{ matrix.tag }}
          path: lenso-cli/vendor
          if-no-files-found: error

  publish:
    name: publish @lenso/cli
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        shell: bash
    steps:
      - name: Check release secrets
        run: test -n "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: actions/checkout@v6
        with:
          path: lenso-cli
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          pattern: lenso-cli-*
          path: lenso-cli
          merge-multiple: true
      - name: Verify package payload
        run: |
          chmod +x vendor/darwin-arm64/lenso vendor/darwin-x64/lenso vendor/linux-x64/lenso
          find vendor -maxdepth 3 -type f -print
          npm run check:npm-shim
          npm run check:npm-publish
          npm pack --dry-run --ignore-scripts
        working-directory: lenso-cli
      - run: npm publish --access public --ignore-scripts
        working-directory: lenso-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
