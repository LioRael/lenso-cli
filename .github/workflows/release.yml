name: release

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check release secrets
        run: |
          test -n "$CARGO_REGISTRY_TOKEN"
          test -n "$LENSO_RUNTIME_CONSOLE_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          LENSO_RUNTIME_CONSOLE_TOKEN: ${{ secrets.LENSO_RUNTIME_CONSOLE_TOKEN }}
      - uses: actions/checkout@v6
        with:
          path: lenso-cli
      - uses: actions/checkout@v6
        with:
          repository: LioRael/lenso-runtime-console
          token: ${{ secrets.LENSO_RUNTIME_CONSOLE_TOKEN }}
          path: lenso-runtime-console
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lenso-cli
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
        working-directory: lenso-runtime-console
      - run: corepack pnpm build:local
        working-directory: lenso-runtime-console
        env:
          LENSO_CONSOLE_BASE: /console/
          VITE_API_AUTH_TOKEN: dev-service:admin:runtime.stories.read,identity.users.read,remote_crm.contacts.read,remote_crm.contacts.sync,hello-action:greetings:write
          VITE_API_BASE_URL: /
          VITE_RUNTIME_CONSOLE_MODE: api
      - run: |
          rm -rf console/dist
          cp -R ../lenso-runtime-console/dist console/dist
          test -f console/dist/index.html
          grep -q 'src="/console/assets/' console/dist/index.html
          grep -q 'href="/console/assets/' console/dist/index.html
          grep -R -q 'dev-service:admin:runtime.stories.read' console/dist/assets
          ! grep -R -q 'function F(){return!1}' console/dist/assets
        working-directory: lenso-cli
      - run: cargo test --locked
        working-directory: lenso-cli
      - run: cargo publish --locked --allow-dirty
        working-directory: lenso-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
